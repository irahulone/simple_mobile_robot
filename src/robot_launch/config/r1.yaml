# Differential-drive gain parameters
# Used by kinematic_core (forward) and sim_robot (inverse)
/**:
  ros__parameters:
    k1: 1.0   # translational gain, left wheel
    k2: 1.0   # rotational gain, left wheel
    k3: 1.0   # translational gain, right wheel
    k4: 1.0   # rotational gain, right wheel
